{% load static %}
<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}GradeInsight{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'css/app.css' %}" />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  </head>
  <body>
    <div class="grid-bg"></div>
    {% if user.is_authenticated %}
      <header class="main-nav" role="banner">
        <div class="brand">GradeInsight</div>
        <nav>
          <a href="{% url 'exam_list' %}">考试列表</a>
          <a href="{% url 'import_upload' %}">导入成绩</a>
          <a href="{% url 'task_list' %}">任务清单</a>
        </nav>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="ghost-btn">退出</button>
        </form>
      </header>
    {% endif %}

    <main class="page-shell">
      {% include 'includes/messages.html' %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
