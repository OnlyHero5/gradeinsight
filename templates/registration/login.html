{% extends 'base.html' %}

{% block title %}登录 | GradeInsight{% endblock %}

{% block content %}
  <section class="panel" style="max-width: 460px; margin: 80px auto 0;">
    <header class="page-header" style="margin-bottom: 8px;">
      <div>
        <h1 class="page-title">教师登录</h1>
        <p class="page-subtitle">单账号模式，登录后可上传成绩并管理任务。</p>
      </div>
    </header>

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="id_username">用户名</label>
        {{ form.username }}
      </div>
      <div class="field" style="margin-top: 10px;">
        <label for="id_password">密码</label>
        {{ form.password }}
      </div>
      <div class="action-row">
        <button class="btn" type="submit">登录</button>
      </div>
      {% if form.errors %}
        <p class="page-subtitle" style="color: var(--danger);">用户名或密码错误。</p>
      {% endif %}
    </form>
  </section>
{% endblock %}
